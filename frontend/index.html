<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Ops Lite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Campus Ops Lite</h1>
            <p class="subtitle">校园工单协同系统</p>
        </header>

        <section class="stats-section">
            <h2>统计摘要</h2>
            <div class="stats-cards" id="statsCards">
                <div class="stat-card stat-total">
                    <span class="stat-label">总工单</span>
                    <span class="stat-value" id="statTotal">0</span>
                </div>
                <div class="stat-card stat-pending">
                    <span class="stat-label">待处理</span>
                    <span class="stat-value" id="statPending">0</span>
                </div>
                <div class="stat-card stat-overdue">
                    <span class="stat-label">已逾期</span>
                    <span class="stat-value" id="statOverdue">0</span>
                </div>
                <div class="stat-card stat-near-overdue">
                    <span class="stat-label">即将逾期</span>
                    <span class="stat-value" id="statNearOverdue">0</span>
                </div>
                <div class="stat-card stat-group-dormitory">
                    <span class="stat-label">宿舍管理(待处理)</span>
                    <span class="stat-value" id="statGroupDormitory">0</span>
                </div>
                <div class="stat-card stat-group-logistics">
                    <span class="stat-label">后勤保障(待处理)</span>
                    <span class="stat-value" id="statGroupLogistics">0</span>
                </div>
                <div class="stat-card stat-group-it">
                    <span class="stat-label">信息中心(待处理)</span>
                    <span class="stat-value" id="statGroupIt">0</span>
                </div>
            </div>
        </section>

        <section class="filter-section">
            <div class="filter-row">
                <div class="filter-group">
                    <label for="filterStatus">状态</label>
                    <select id="filterStatus">
                        <option value="">全部</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="filterPriority">优先级</label>
                    <select id="filterPriority">
                        <option value="">全部</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="filterGroup">分组</label>
                    <select id="filterGroup">
                        <option value="">全部</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="filterKeyword">关键词</label>
                    <input type="text" id="filterKeyword" placeholder="搜索标题/地点/负责人/联系方式">
                </div>
            </div>
            <button class="btn btn-primary" id="createTicketBtn">新增工单</button>
        </section>

        <div class="warning-section" id="warningSection" style="display:none;">
            <div class="warning-header">重复工单警告</div>
            <div id="warningContent"></div>
            <button class="btn btn-secondary btn-sm" id="warningClose">关闭</button>
        </div>

        <section class="ticket-section">
            <h2>工单列表</h2>
            <div class="ticket-list" id="ticketList"></div>
        </section>

        <div class="modal" id="createModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>新增工单</h3>
                    <span class="modal-close" data-modal="createModal">&times;</span>
                </div>
                <div class="modal-body">
                    <form id="createForm">
                        <div class="form-group">
                            <label for="createTitle">标题 *</label>
                            <input type="text" id="createTitle" name="title" required>
                        </div>
                        <div class="form-group">
                            <label for="createPriority">优先级 *</label>
                            <select id="createPriority" name="priority" required></select>
                        </div>
                        <div class="form-group">
                            <label for="createGroup">分组 *</label>
                            <select id="createGroup" name="group" required></select>
                        </div>
                        <div class="form-group">
                            <label for="createAssignee">负责人</label>
                            <input type="text" id="createAssignee" name="assignee">
                        </div>
                        <div class="form-group">
                            <label for="createLocation">地点</label>
                            <input type="text" id="createLocation" name="location">
                        </div>
                        <div class="form-group">
                            <label for="createContact">联系方式</label>
                            <input type="text" id="createContact" name="contact">
                        </div>
                        <div class="form-group">
                            <label for="createDeadline">截止时间</label>
                            <input type="datetime-local" id="createDeadline" name="deadline">
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">提交</button>
                            <button type="button" class="btn btn-secondary modal-cancel" data-modal="createModal">取消</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="modal" id="assignModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>指派工单</h3>
                    <span class="modal-close" data-modal="assignModal">&times;</span>
                </div>
                <div class="modal-body">
                    <form id="assignForm">
                        <input type="hidden" id="assignTicketId">
                        <div class="form-group">
                            <label for="assignAssignee">负责人 *</label>
                            <input type="text" id="assignAssignee" name="assignee" required>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">确认指派</button>
                            <button type="button" class="btn btn-secondary modal-cancel" data-modal="assignModal">取消</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
